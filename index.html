<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trợ lý tuyển sinh CAND</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

.header {
  background:#c40000;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.chat {
  padding:15px;
}

.bot {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  max-width:70%;
}

.user {
  text-align:right;
  margin:10px;
}

.btns {
  padding:10px;
  text-align:center;
}

.btns button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffe6e6;
  color:red;
  cursor:pointer;
}

.input {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button.send {
  margin-left:10px;
  padding:10px 15px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
👮‍♂️ Trợ lý tuyển sinh CAND 2026<br>
Công an xã Trà Đốc
</div>

<div class="chat" id="chat">
<div class="bot">
Xin chào! Tôi là trợ lý tuyển sinh CAND.<br>
👉 Hãy chọn nội dung hoặc nhập câu hỏi bên dưới.
</div>
</div>

<div class="btns">
<button onclick="reply('dh')">Đại học</button>
<button onclick="reply('vb2')">VB2CA</button>
<button onclick="reply('tc')">Trung cấp</button>
<button onclick="reply('sk')">Sức khỏe</button>
<button onclick="reply('time')">Thời gian</button>
</div>

<div class="input">
<input id="txt" placeholder="Nhập câu hỏi...">
<button class="send" onclick="send()">Gửi</button>
</div>

<script>
function add(msg, type){
  let div = document.createElement("div");
  div.className = type;
  div.innerHTML = msg;
  document.getElementById("chat").appendChild(div);
}

function reply(type){
  if(type=="dh"){
    add("🎓 <b>Tuyển sinh Đại học CAND</b><br>\
- Đối tượng: học sinh tốt nghiệp THPT hoặc tương đương<br>\
- Phải tham gia sơ tuyển tại Công an cấp xã<br>\
- Điều kiện theo quy định của Bộ Công an<br>\
👉 Liên hệ Công an xã Trà Đốc để được hướng dẫn.", "bot");
  }

  if(type=="vb2"){
    add("📘 <b>Văn bằng 2 CAND (VB2CA)</b><br>\
- Dành cho người đã tốt nghiệp đại học<br>\
- Đảm bảo tiêu chuẩn chính trị, sức khỏe<br>\
👉 Công an xã Trà Đốc hỗ trợ hồ sơ.", "bot");
  }

  if(type=="tc"){
    add("🏫 <b>Trung cấp CAND</b><br>\
- Theo chỉ tiêu phân bổ<br>\
- Phải qua sơ tuyển<br>\
👉 Liên hệ Công an xã để biết chi tiết.", "bot");
  }

  if(type=="sk"){
    add("💪 <b>Tiêu chuẩn sức khỏe</b><br>\
- Nam: ≥ 1m64<br>\
- Nữ: ≥ 1m58<br>\
- BMI: 18.5 đến dưới 30<br>\
- Không xăm phản cảm<br>\
👉 Kiểm tra cụ thể tại sơ tuyển.", "bot");
  }

  if(type=="time"){
    add("📅 <b>Thời gian sơ tuyển</b><br>\
- 19/3 đến 02/4/2026<br>\
📍 Công an xã Trà Đốc<br>\
📞 Đ/c Lê Văn Trí: 0387 913 777", "bot");
  }
}
function send(){
  let txt = document.getElementById("txt").value.trim().toLowerCase();
  if(txt==="") return;

  add(txt, "user");

  if(txt.includes("đại học") || txt.includes("dai hoc")){
    reply("dh");
  } else if(txt.includes("vb2") || txt.includes("văn bằng 2") || txt.includes("van bang 2")){
    reply("vb2");
  } else if(txt.includes("trung cấp") || txt.includes("trung cap")){
    reply("tc");
  } else if(txt.includes("sức khỏe") || txt.includes("suc khoe") || txt.includes("chiều cao") || txt.includes("cao") || txt.includes("bmi")){
    reply("sk");
  } else if(txt.includes("thời gian") || txt.includes("thoi gian") || txt.includes("khi nào") || txt.includes("khi nao") || txt.includes("địa điểm") || txt.includes("dia diem")){
    reply("time");
  } else if(txt.includes("hồ sơ") || txt.includes("ho so") || txt.includes("giấy tờ") || txt.includes("giay to")){
    add("📂 <b>Hồ sơ sơ tuyển</b><br>\
- CCCD<br>\
- Học bạ<br>\
- Sơ yếu lý lịch<br>\
👉 Đến Công an xã Trà Đốc để được hướng dẫn cụ thể.", "bot");
  } else if(txt.includes("liên hệ") || txt.includes("lien he") || txt.includes("số điện thoại") || txt.includes("so dien thoai")){
    add("📞 <b>Liên hệ tuyển sinh</b><br>\
Đ/c Lê Văn Trí - 0387 913 777<br>\
📍 Công an xã Trà Đốc", "bot");
  } else {
    add("👉 Bạn hãy hỏi về: đại học, VB2CA, trung cấp, sức khỏe, thời gian, hồ sơ, liên hệ.", "bot");
  }

  document.getElementById("txt").value="";
}

  document.getElementById("txt").value="";
}
</script>

</body>
</html>
