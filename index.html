<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tuyển sinh CAND Trà Đốc</title>
<style>
body {font-family: Arial; margin:0; background:#f2f2f2;}
.header {background:#c40000; color:white; padding:15px; text-align:center;}
.chat {padding:15px;}
.bot {background:white; padding:10px; border-radius:10px; margin:10px 0;}
.user {text-align:right;}
.input {display:flex; padding:10px;}
input {flex:1; padding:10px;}
button {padding:10px; background:red; color:white; border:none;}
</style>
</head>

<body>

<div class="header">
👮‍♂️ Trợ lý tuyển sinh CAND 2026<br>
Công an xã Trà Đốc
</div>

<div id="chat" class="chat">
<div class="bot">
Xin chào! Hãy hỏi tôi về tuyển sinh CAND.
</div>
</div>

<div class="input">
<input id="txt" placeholder="Nhập câu hỏi...">
<button onclick="send()">Gửi</button>
</div>

<script>
function send(){
 let t = document.getElementById("txt").value;
 let c = document.getElementById("chat");

 c.innerHTML += "<div class='user'>"+t+"</div>";

 if(t.includes("cao")){
   c.innerHTML += "<div class='bot'>📏 Nam 1m64+, Nữ 1m58+</div>";
 } else if(t.includes("hồ sơ")){
   c.innerHTML += "<div class='bot'>📂 Học bạ, CCCD, sơ yếu lý lịch</div>";
 } else if(t.includes("khi") || t.includes("thời gian")){
   c.innerHTML += "<div class='bot'>📅 19/3 - 02/4 tại Công an xã Trà Đốc</div>";
 } else {
   c.innerHTML += "<div class='bot'>👉 Liên hệ Công an xã Trà Đốc để biết thêm.</div>";
 }

 document.getElementById("txt").value="";
}
</script>

</body>
</html>
