<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trợ lý tuyển sinh CAND</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

.header {
  background:#c40000;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.chat {
  padding:15px;
}

.bot {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  max-width:70%;
}

.user {
  text-align:right;
  margin:10px;
}

.btns {
  padding:10px;
  text-align:center;
}

.btns button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffe6e6;
  color:red;
  cursor:pointer;
}

.input {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button.send {
  margin-left:10px;
  padding:10px 15px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
👮‍♂️ Trợ lý tuyển sinh CAND 2026<br>
Công an xã Trà Đốc
</div>

<div class="chat" id="chat">
<div class="bot">
Xin chào! Tôi là trợ lý tuyển sinh CAND.<br>
👉 Hãy chọn nội dung hoặc nhập câu hỏi bên dưới.
</div>
</div>

<div class="btns">
<button onclick="reply('dh')">Đại học</button>
<button onclick="reply('vb2')">VB2CA</button>
<button onclick="reply('tc')">Trung cấp</button>
<button onclick="reply('sk')">Sức khỏe</button>
<button onclick="reply('time')">Thời gian</button>
</div>

<div class="input">
<input id="txt" placeholder="Nhập câu hỏi...">
<button class="send" onclick="send()">Gửi</button>
</div>

<script>
function add(msg, type){
  let div = document.createElement("div");
  div.className = type;
  div.innerHTML = msg;
  document.getElementById("chat").appendChild(div);
}

function reply(type){
  if(type=="dh"){
    add("🎓 Tuyển sinh Đại học CAND theo quy định của Bộ Công an.", "bot");
  }
  if(type=="vb2"){
    add("📘 VB2CA dành cho người đã có bằng đại học.", "bot");
  }
  if(type=="tc"){
    add("🏫 Trung cấp Công an theo chỉ tiêu địa phương.", "bot");
  }
  if(type=="sk"){
    add("💪 Chiều cao: Nam 1m64+, Nữ 1m58+<br>BMI chuẩn, không xăm.", "bot");
  }
  if(type=="time"){
    add("📅 19/3 - 02/4 tại Công an xã Trà Đốc", "bot");
  }
}

function send(){
  let txt = document.getElementById("txt").value;
  add(txt, "user");

  if(txt.includes("cao")){
    reply("sk");
  } else if(txt.includes("hồ sơ")){
    add("📂 Học bạ, CCCD, sơ yếu lý lịch", "bot");
  } else if(txt.includes("khi")){
    reply("time");
  } else {
    add("👉 Liên hệ Công an xã Trà Đốc để được hướng dẫn.", "bot");
  }

  document.getElementById("txt").value="";
}
</script>

</body>
</html>
